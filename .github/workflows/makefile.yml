name: Build OrangeFox Real

on:
  push:
    branches: [ "main" ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repo
        uses: actions/checkout@v4

      - name: Persiapkan Alat (AIK)
        run: |
          # Pakai AIK versi Linux yang paling stabil buat bongkar-pasang .img
          wget https://github.com -O aik.zip
          unzip aik.zip
          mv Android-Image-Kitchen-master AIK
          chmod -R 755 AIK/

      - name: Proses Menjadi IMG
        run: |
          mkdir -p output
          
          # Cari file .img di folder device Abang (seperti dtb.img di gambar tadi)
          FILE_IMG=$(find device/tecno/TECNO-LG6n/ -name "*.img" | head -n 1)
          
          if [ -z "$FILE_IMG" ]; then
            echo "FILE .IMG TIDAK KETEMU!"
            exit 1
          fi

          echo "Sedang memproses: $FILE_IMG"
          cp "$FILE_IMG" AIK/boot.img
          
          cd AIK/
          # Perintah bongkar dan bungkus ulang (Repack)
          ./unpackimg.sh boot.img
          ./repackimg.sh
          
          # Pindahkan hasil jadinya
          mv image-new.img ../output/OrangeFox-Tecno-LG6n.img 2>/dev/null || echo "Gagal bungkus!"

      - name: Download Hasil Jadi
        uses: actions/upload-artifact@v4
        with:
          name: OrangeFox-Project-Hasil
          path: output/
