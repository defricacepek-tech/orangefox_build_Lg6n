name: Bongkar dan Tata Folder Otomatis

on:
  push:
    branches: [ "main" ]
  workflow_dispatch:

jobs:
  ekstrak-dan-tata:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Ambil File ZIP
        uses: actions/checkout@v4

      - name: Ekstrak dan Buat Struktur OrangeFox
        run: |
          # 1. Buat folder standar: device/brand/codename
          mkdir -p device/tecno/TECNO-LG6n
          
          # 2. Ekstrak ZIP 9MB ke folder tersebut
          # (Script ini otomatis mencari file .zip apa pun di repo Abang)
          unzip -o *.zip -d device/tecno/TECNO-LG6n/
          
          # 3. Hapus file ZIP asli biar rapi
          rm *.zip
          
          # 4. Cek apakah folder 'recovery' dkk sudah masuk
          ls -R device/tecno/TECNO-LG6n/

      - name: Simpan Perubahan ke GitHub
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "Struktur folder device/tecno/TECNO-LG6n SUDAH RAPI!"
