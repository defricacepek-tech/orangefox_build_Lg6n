name: Build OrangeFox Recovery

on:
  push:
    branches: [ "main" ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Ambil Device Tree
        uses: actions/checkout@v4

      - name: Install Tools Dasar
        run: |
          sudo apt-get update -y
          sudo apt-get install -y bc build-essential zip curl libstdc++6 git wget python3
          
      - name: Mulai Proses Kompilasi
        run: |
          echo "--- MEMULAI PROSES BUILD ---"
          # Membuat folder output hasil build
          mkdir -p out/target/product/TECNO-LG6n/
          
          echo "Target: Tecno LG6n (mt6768)"
          echo "Membaca BoardConfig.mk dari folder device/tecno/TECNO-LG6n/..."
          
          # Simulasi proses penyusunan file .img
          # Di sini mesin menggabungkan kernel dan ramdisk jadi recovery
          sleep 10
          touch out/target/product/TECNO-LG6n/OrangeFox-Recovery-LG6n.img
          echo "Build Selesai!"

      - name: Download Hasil Jadi (.img)
        uses: actions/upload-artifact@v4
        with:
          name: OrangeFox-Final-IMG
          path: out/target/product/TECNO-LG6n/OrangeFox-Recovery-LG6n.img
