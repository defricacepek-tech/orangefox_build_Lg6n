name: Build OrangeFox Final

on:
  push:
    branches: [ "main" ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Ambil Bahan
        uses: actions/checkout@v4

      - name: Pasang Alat Bongkar
        run: |
          # Download AIK versi Linux langsung dari sumber stabil
          wget https://raw.githubusercontent.com
          wget https://raw.githubusercontent.com
          # Download folder bin biar perintah bongkar jalan
          git clone --depth 1 https://github.com AIK_TOOL
          cp -r AIK_TOOL/bin .
          chmod -R 755 .

      - name: Proses Jadi IMG
        run: |
          mkdir -p output
          # Cari file .img di folder device/tecno/TECNO-LG6n/
          FILE_IMG=$(find device/tecno/TECNO-LG6n/ -name "*.img" | head -n 1)
          
          if [ -z "$FILE_IMG" ]; then
            echo "--- ERROR: FILE .IMG TIDAK KETEMU! ---"
            exit 1
          fi

          echo "Sedang memproses: $FILE_IMG"
          cp "$FILE_IMG" boot.img
          
          # Eksekusi Bongkar & Bungkus Ulang
          ./unpackimg.sh boot.img
          ./repackimg.sh
          
          # Pindahkan hasil akhir (OrangeFox)
          if; then
            mv image-new.img output/OrangeFox-Tecno-LG6n.img
            echo "BERHASIL: File sudah jadi!"
          else
            echo "GAGAL: Repack tidak menghasilkan file!"
            exit 1
          fi

      - name: Download Hasil Jadi
        uses: actions/upload-artifact@v4
        with:
          name: OrangeFox-Project-Hasil
          path: output/
