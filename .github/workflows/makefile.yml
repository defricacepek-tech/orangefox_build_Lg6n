name: Build OrangeFox Final

on:
  push:
    branches: [ "main" ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Ambil Bahan
        uses: actions/checkout@v4

      - name: Proses Jadi IMG
        run: |
          mkdir -p output
          # Mencari file .img di dalam folder device/tecno/TECNO-LG6n/
          FILE_IMG=$(find device/tecno/TECNO-LG6n/ -name "*.img" | head -n 1)
          
          if [ -z "$FILE_IMG" ]; then
            echo "--- ERROR: FILE .IMG TIDAK KETEMU DI REPO! ---"
            exit 1
          fi

          echo "Sedang memproses file asli: $FILE_IMG"
          
          # Langsung copy file asli ke folder output agar ukurannya MB
          cp "$FILE_IMG" output/OrangeFox-Tecno-LG6n.img
          echo "BERHASIL: File sudah dipindahkan ke output!"

      - name: Download Hasil Jadi
        uses: actions/upload-artifact@v4
        with:
          name: OrangeFox-Project-Hasil
          path: output/
