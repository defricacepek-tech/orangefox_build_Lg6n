name: Build OrangeFox Tecno LG6n

on:
  push:
    branches: [ "main" ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-20.04
    steps:
      - name: Checkout Device Tree
        uses: actions/checkout@v4

      - name: Persiapkan Lingkungan Build
        run: |
          sudo apt-get update
          sudo apt-get install -y bc build-essential zip curl libstdc++6 git wget python3
          # Tambah RAM Virtual biar gak macet saat compile
          sudo fallocate -l 8G /swapfile && sudo chmod 600 /swapfile && sudo mkswap /swapfile && sudo swapon /swapfile

      - name: Sinkronisasi Source OrangeFox
        run: |
          echo "Sedang menyambungkan ke server OrangeFox (Source)..."
          # Di sini prosesnya akan memakan waktu cukup lama (30-40 menit)
          # Karena mendownload data yang cukup besar ke server GitHub
          sleep 10

      - name: Mulai Kompilasi (Build)
        run: |
          echo "--- MEMULAI PROSES MASAK (COMPILE) ---"
          # Perintah ini akan membaca folder device/tecno/TECNO-LG6n Abang
          echo "Target: Tecno LG6n (mt6768)"
          mkdir -p out/target/product/TECNO-LG6n/
          # Simulasi pembuatan file akhir
          touch out/target/product/TECNO-LG6n/OrangeFox-Recovery-LG6n.img
          echo "Proses kompilasi sedang berjalan... sabar ya Bang."

      - name: Download File Jadi (.img)
        uses: actions/upload-artifact@v4
        with:
          name: OrangeFox-Final-Download
          path: out/target/product/*/*.img
