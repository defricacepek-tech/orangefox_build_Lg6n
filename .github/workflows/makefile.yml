name: Build Real OrangeFox

on:
  push:
    branches: [ "main" ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Tool Bungkus (AIK)
        run: |
          sudo apt-get update
          sudo apt-get install -y p7zip-full
          git clone https://github.com AIK
          chmod -R 755 AIK/

      - name: Proses Menjadi IMG
        run: |
          # 1. Pindahkan bahan bongkaran ke folder AIK
          cp -r device/tecno/TECNO-LG6n/* AIK/ 2>/dev/null || true
          
          cd AIK/
          # 2. Perintah sakti untuk membungkus ulang jadi file .img
          ./repackimg.sh
          
          # 3. Siapkan hasil akhir
          mkdir -p ../output
          mv image-new.img ../output/OrangeFox-Tecno-LG6n.img 2>/dev/null || echo "Gagal bungkus!"

      - name: Download Hasil Jadi (IMG Asli)
        uses: actions/upload-artifact@v4
        with:
          name: OrangeFox-Real-IMG
          path: output/
