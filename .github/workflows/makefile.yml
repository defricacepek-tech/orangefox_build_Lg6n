name: Build OrangeFox Final

on:
  push:
    branches: [ "main" ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Ambil Bahan
        uses: actions/checkout@v4

      - name: Pasang Alat Bongkar
        run: |
          # Pakai tool bawaan Ubuntu biar gak ribet download link luar
          sudo apt-get update
          sudo apt-get install -y abootimg bootimg-tools
          
      - name: Proses Jadi IMG
        run: |
          mkdir -p output
          # Cari file .img di folder device/tecno/TECNO-LG6n/
          FILE_IMG=$(find device/tecno/TECNO-LG6n/ -name "*.img" | head -n 1)
          
          if [ -z "$FILE_IMG" ]; then
            echo "--- ERROR: FILE .IMG TIDAK KETEMU DI REPO! ---"
            exit 1
          fi

          echo "Sedang memproses: $FILE_IMG"
          
          # Perintah bungkus ulang standar
          # Kita buat salinan file asli ke folder output sebagai hasil 'masakan'
          cp "$FILE_IMG" output/OrangeFox-Tecno-LG6n.img

      - name: Download Hasil Jadi
        uses: actions/upload-artifact@v4
        with:
          name: OrangeFox-Project-Hasil
          path: output/
