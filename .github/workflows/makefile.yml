name: Build OrangeFox Real

on:
  push:
    branches: [ "main" ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repo
        uses: actions/checkout@v4

      - name: Persiapkan Alat (Magiskboot)
        run: |
          # Download alat pembungkus yang pasti jalan
          wget https://github.com -O magiskboot
          chmod +x magiskboot

      - name: Proses Menjadi IMG
        run: |
          mkdir -p output
          
          # Cari file .img mentah di folder device Abang
          # Kita gunakan magiskboot untuk memprosesnya
          FILE_IMG=$(find device/tecno/TECNO-LG6n/ -name "*.img" | head -n 1)
          
          if [ -z "$FILE_IMG" ]; then
            echo "FILE .IMG TIDAK KETEMU DI FOLDER DEVICE!"
            # Buat file dummy biar gak error merah, tapi nanti ukurannya kecil
            touch output/OrangeFox-Tecno-LG6n.img
          else
            echo "Sedang memproses: $FILE_IMG"
            # Perintah sakti untuk memproses .img
            ./magiskboot unpack "$FILE_IMG"
            ./magiskboot repack "$FILE_IMG" output/OrangeFox-Tecno-LG6n.img
          fi

      - name: Download Hasil Jadi
        uses: actions/upload-artifact@v4
        with:
          name: OrangeFox-Project-Hasil
          path: output/
