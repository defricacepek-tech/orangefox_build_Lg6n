name: Build OrangeFox Final

on:
  push:
    branches: [ "main" ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Ambil Bahan
        uses: actions/checkout@v4

      - name: Cari dan Pindahkan File .IMG
        run: |
          mkdir -p output
          echo "--- MENCARI SEMUA FILE .IMG DI REPO ---"
          # Perintah ini akan mencari file .img di SEMUA folder
          find . -name "*.img" -exec cp {} output/OrangeFox-Tecno-LG6n.img \;
          
          echo "--- CEK APAKAH FILE SUDAH MASUK KE FOLDER OUTPUT ---"
          ls -lh output/

      - name: Download Hasil Jadi
        uses: actions/upload-artifact@v4
        with:
          name: OrangeFox-Project-Hasil
          path: output/OrangeFox-Tecno-LG6n.img
          if-no-files-found: error # Biar merah kalau filenya beneran gak ada
